# EloqDB product manifest — the source of truth for which products are built.
#
# Versioning policy (see CLAUDE.md):
#   - eloqdata/ repos (and the ltzhang/eloq_build_env umbrella) -> always latest (default-branch HEAD)
#   - all other third-party repos   -> pinned (see scripts/deps/*.sh / BUILD-PLAN.md)
#
# `scripts/build.sh` clones only enabled products into projects/, builds the union of their
# dependencies once into install/, then builds each product via its adapter.

[defaults]
# Default backend feature flags applied to a product unless it overrides them.
# EloqStore data store + RocksDB log state => no cloud stack (AWS/GCP/rocksdb-cloud).
with_data_store = "ELOQDSS_ELOQSTORE"
with_log_state  = "ROCKSDB"

[products.eloqkv]
enabled = true
repo    = "git@github.com:eloqdata/eloqkv.git"
branch  = ""                     # empty => remote default (build prefers ELOQDB_MOD_BRANCH if present)
build   = "cmake"
adapter = "scripts/projects/eloqkv.sh"

[products.eloqsql]
enabled = false
repo    = "git@github.com:eloqdata/eloqsql.git"
branch  = ""                     # empty => remote default (prefers ELOQDB_MOD_BRANCH)
build   = "cmake"
adapter = "scripts/projects/eloqsql.sh"

[products.eloqdoc]
enabled = false
repo    = "git@github.com:eloqdata/eloqdoc.git"
branch  = ""                     # empty => remote default (prefers ELOQDB_MOD_BRANCH)
build   = "scons"                # MongoDB 4.0.3 fork: SCons + Python 2.7 (provisioned by adapter)
adapter = "scripts/projects/eloqdoc.sh"

# eloquentdb is itself an umbrella: one `eloqdb` binary linking eloqkv + eloqsql + the shared
# core. Upstream it pulls each engine as a pinned git submodule; here we DON'T — its submodule
# paths are pointed at this umbrella's own checkouts (projects/<engine>, shared data_substrate)
# and follow latest. recurse_submodules=false => clone the top-level repo only; the adapter wires
# the submodule paths. Our edits to eloquentdb itself go on ELOQDB_MOD_BRANCH (lintao-mod).
[products.eloquentdb]
enabled            = false
repo               = "git@github.com:eloqdata/eloquentdb.git"
branch             = ""          # empty => remote default (prefers ELOQDB_MOD_BRANCH/lintao-mod)
build              = "cmake"
adapter            = "scripts/projects/eloquentdb.sh"
recurse_submodules = false       # umbrella repo: override submodules with our own checkouts
